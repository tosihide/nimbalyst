name: CI
run-name: "CI #${{ github.run_number }}: ${{ github.event.head_commit.message }}"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build extension-sdk
        working-directory: packages/extension-sdk
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit -- --run

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci

      # Build packages that export types (required before typecheck)
      - name: Build extension-sdk
        working-directory: packages/extension-sdk
        run: npm run build

      - name: Public extension SDK smoke checks
        run: npm run extension-sdk:check-public

      - name: Build runtime
        working-directory: packages/runtime
        run: npm run build

      # Typecheck core packages
      - name: TypeScript check - electron
        working-directory: packages/electron
        run: npx tsc --noEmit

      - name: TypeScript check - runtime
        working-directory: packages/runtime
        run: npx tsc --noEmit

      - name: TypeScript check - extension-sdk
        working-directory: packages/extension-sdk
        run: npx tsc --noEmit

      # Typecheck extensions
      - name: TypeScript check - extensions/pdf-viewer
        working-directory: packages/extensions/pdf-viewer
        run: npx tsc --noEmit

      - name: TypeScript check - extensions/extension-dev-kit
        working-directory: packages/extensions/extension-dev-kit
        run: npx tsc --noEmit

      - name: TypeScript check - collabv3
        working-directory: packages/collabv3
        run: npx tsc --noEmit

      - name: TypeScript check - extensions/datamodellm
        working-directory: packages/extensions/datamodellm
        run: npx tsc --noEmit

      - name: TypeScript check - extensions/csv-spreadsheet
        working-directory: packages/extensions/csv-spreadsheet
        run: npx tsc --noEmit
