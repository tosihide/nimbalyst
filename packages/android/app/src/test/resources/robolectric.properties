# Robolectric 4.13 ships android-all jars up to API 34 (Android 14); the app
# compiles against API 35. Pin Robolectric's emulated SDK to 34 so JVM unit
# tests initialize. Bump this when upgrading to Robolectric >= 4.14 (API 35).
sdk=34

# Use a plain Application so the real NimbalystApplication.onCreate (which builds
# a security-crypto MasterKey needing AndroidKeyStore, absent under Robolectric)
# does not run. DAO/integration tests only need a Context.
application=android.app.Application
