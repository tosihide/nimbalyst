<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimbalyst</title>

    <!-- es-module-shims: enables dynamic import maps for extension loading -->
    <!-- Must be loaded before any module scripts. Provides importShim() and importShim.addImportMap() -->
    <!-- shimMode enables addImportMap() for dynamic import map registration -->
    <script>window.esmsInitOptions = { shimMode: true };</script>
    <script async src="./es-module-shims.js"></script>

    <!-- Load prismjs synchronously BEFORE any ESM module evaluates so that
         window.Prism is set when the prism-* language chunks reference the
         bare `Prism` global. Vite/esbuild prebundling of @lexical/code (via
         @lexical/code-prism) reorders chunk imports such that prism-language
         chunks evaluate before prismjs main, so the global must already be
         present. The `prismjs` ESM specifier is aliased (in
         electron.vite.config.ts) to a shim that re-exports this same
         instance, preventing a second IIFE run that would orphan language
         registrations on a stale instance. -->
    <script src="./prism.js"></script>

    <script>
        // Determine theme FIRST, before any CSS - using SYNC API to prevent flash
        // IMPORTANT: getResolvedThemeSync() collapses 'system' and any extension
        // theme into 'light' | 'dark' | 'crystal-dark', so we can apply the
        // correct base class before React mounts.
        (function() {
            // Diagnostic logging for theme initialization issues
            const hasElectronAPI = !!window.electronAPI;
            const hasGetResolvedThemeSync = !!(window.electronAPI?.getResolvedThemeSync);
            console.log('[THEME-INIT] Diagnostic:', {
                hasElectronAPI,
                hasGetResolvedThemeSync,
                platform: navigator.platform,
                userAgent: navigator.userAgent
            });

            // Get theme SYNCHRONOUSLY from main process - already resolved!
            let theme;
            try {
                theme = window.electronAPI?.getResolvedThemeSync?.() || 'light';
            } catch (err) {
                console.error('[THEME-INIT] Error calling getResolvedThemeSync:', err);
                theme = 'light';
            }

            console.log('[THEME-INIT] Resolved theme from main process:', theme);

            const root = document.documentElement;

            // Apply theme directly - getResolvedThemeSync() already resolved
            // system + extension themes to a base class for us.
            if (theme === 'dark') {
                root.classList.add('dark-theme');
                root.setAttribute('data-theme', 'dark');
            } else if (theme === 'light') {
                root.classList.add('light-theme');
                root.setAttribute('data-theme', 'light');
            } else if (theme === 'crystal-dark') {
                root.classList.add('crystal-dark-theme');
                root.setAttribute('data-theme', 'crystal-dark');
            } else {
                // Fallback to light (shouldn't happen)
                console.warn('[THEME-INIT] Unexpected theme:', theme, 'falling back to light');
                root.classList.add('light-theme');
                root.setAttribute('data-theme', 'light');
            }

            console.log('[THEME-INIT] Applied class:', theme + '-theme', 'to document.documentElement');
        })();
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
